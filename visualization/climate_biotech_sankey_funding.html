<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Climate Biotech Funding Flow</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        #chart {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .chart-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .chart-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            fill: #333;
        }
        
        .link {
            fill: none;
            stroke-opacity: 0.3;
        }
        
        .link:hover {
            stroke-opacity: 0.7;
        }
        
        .node rect {
            cursor: pointer;
            stroke: none;
        }
        
        .node text {
            font-size: 13px;
            fill: #333;
        }
        
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        
        .bracket {
            fill: none;
            stroke: #666;
            stroke-width: 2;
        }
        
        .bracket-label {
            font-size: 14px;
            font-weight: bold;
            fill: #666;
        }
    </style>
</head>
<body>
    <div id="chart">
        <div class="chart-title">Climate Biotech Federal Grant Flow by Funding (2019-2025)</div>
        <div class="chart-subtitle">Shows distribution of funding amount across grant types and characteristics</div>
        <svg id="sankey"></svg>
    </div>
    <div id="tooltip"></div>
    
    <script>
        const nodesData = [{"name": "Use Inspired Research", "color": "#4472C4", "actualTotal": 495754456.44}, {"name": "Bench Scale Tech Development", "color": "#5B9BD5", "actualTotal": 252080548.44}, {"name": "Piloting", "color": "#70AD47", "actualTotal": 61933463.39}, {"name": "Deployment", "color": "#ED7D31", "actualTotal": 302879094.94}, {"name": "Industry-Facing Research", "color": "#FFC000", "actualTotal": 146168647.94}, {"name": "Infrastructure", "color": "#A5A5A5", "actualTotal": 263080541.57}, {"name": "Other", "color": "#7F7F7F", "actualTotal": 11026054.0}, {"name": "Industry-Relevant Language", "color": "#C5E0B4"}, {"name": "Collaborative Interdisciplinary", "color": "#9DC3E6"}, {"name": "Single-Discipline", "color": "#D5A6BD"}, {"name": "Open Access/Sharing", "color": "#F4B183"}];
        const linksData = [{"source": "Bench Scale Tech Development", "target": "Single-Discipline", "value": 134951439.91000003}, {"source": "Use Inspired Research", "target": "Collaborative Interdisciplinary", "value": 244797428.0}, {"source": "Use Inspired Research", "target": "Single-Discipline", "value": 248581667.44}, {"source": "Use Inspired Research", "target": "Open Access/Sharing", "value": 37519057.83}, {"source": "Industry-Facing Research", "target": "Industry-Relevant Language", "value": 146168647.94}, {"source": "Use Inspired Research", "target": "Industry-Relevant Language", "value": 45846863.0}, {"source": "Bench Scale Tech Development", "target": "Collaborative Interdisciplinary", "value": 117129108.53}, {"source": "Piloting", "target": "Collaborative Interdisciplinary", "value": 38988050.0}, {"source": "Infrastructure", "target": "Open Access/Sharing", "value": 47830976.0}, {"source": "Bench Scale Tech Development", "target": "Industry-Relevant Language", "value": 21920247.0}, {"source": "Infrastructure", "target": "Industry-Relevant Language", "value": 29147707.0}, {"source": "Piloting", "target": "Single-Discipline", "value": 22945413.39}, {"source": "Other", "target": "Industry-Relevant Language", "value": 600000.0}, {"source": "Bench Scale Tech Development", "target": "Open Access/Sharing", "value": 8061569.0}, {"source": "Deployment", "target": "Industry-Relevant Language", "value": 302879094.94}, {"source": "Piloting", "target": "Open Access/Sharing", "value": 318666.0}, {"source": "Piloting", "target": "Industry-Relevant Language", "value": 6213878.0}, {"source": "Industry-Facing Research", "target": "Open Access/Sharing", "value": 1959609.0}, {"source": "Deployment", "target": "Open Access/Sharing", "value": 2016941.0}, {"source": "Other", "target": "Open Access/Sharing", "value": 3759119.0}];
        
        const margin = {top: 60, right: 250, bottom: 20, left: 350};
        const width = 1200 - margin.left - margin.right;
        const height = 700 - margin.top - margin.bottom;
        
        const svg = d3.select("#sankey")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);
        
        // Add section titles
        svg.append("text")
            .attr("class", "section-title")
            .attr("x", -40)
            .attr("y", -30)
            .attr("text-anchor", "middle")
            .text("Grant Type");
        
        svg.append("text")
            .attr("class", "section-title")
            .attr("x", width + 40)
            .attr("y", -30)
            .attr("text-anchor", "middle")
            .text("Grant Characteristic");
        
        // Tooltip
        const tooltip = d3.select("#tooltip");
        
        // Create Sankey generator
        const sankey = d3.sankey()
            .nodeId(d => d.name)
            .nodeWidth(18)
            .nodePadding(60)
            .extent([[0, 0], [width, height]]);
        
        const {nodes, links} = sankey({
            nodes: nodesData.map(d => Object.assign({}, d)),
            links: linksData.map(d => Object.assign({}, d))
        });
        
        // FORCE correct vertical order
        const leftNodeNames = [
            'Use Inspired Research',
            'Bench Scale Tech Development',
            'Piloting',
            'Deployment',
            'Industry-Facing Research',
            'Infrastructure',
            'Other'
        ];
        
        const rightNodeNames = [
            'Industry-Relevant Language',
            'Collaborative Interdisciplinary',
            'Single-Discipline',
            'Open Access/Sharing'
        ];
        
        // Research group (first 3 nodes)
        const researchGroup = ['Use Inspired Research', 'Bench Scale Tech Development', 'Piloting'];
        
        nodes.sort((a, b) => {
            const aIsLeft = leftNodeNames.includes(a.name);
            const bIsLeft = leftNodeNames.includes(b.name);
            
            if (aIsLeft && bIsLeft) {
                return leftNodeNames.indexOf(a.name) - leftNodeNames.indexOf(b.name);
            }
            if (!aIsLeft && !bIsLeft) {
                return rightNodeNames.indexOf(a.name) - rightNodeNames.indexOf(b.name);
            }
            return aIsLeft ? -1 : 1;
        });
        
        // Reposition nodes vertically
        const leftNodes = nodes.filter(n => leftNodeNames.includes(n.name));
        const rightNodes = nodes.filter(n => rightNodeNames.includes(n.name));
        
        let currentY = 0;
        leftNodes.forEach(node => {
            const nodeHeight = node.y1 - node.y0;
            node.y0 = currentY;
            node.y1 = currentY + nodeHeight;
            currentY = node.y1 + 60;
        });
        
        currentY = 0;
        rightNodes.forEach(node => {
            const nodeHeight = node.y1 - node.y0;
            node.y0 = currentY;
            node.y1 = currentY + nodeHeight;
            currentY = node.y1 + 60;
        });
        
        // Recalculate link paths
        sankey.update({nodes, links});
        
        // Draw bracket for Research group
        const researchNodes = leftNodes.filter(n => researchGroup.includes(n.name));
        if (researchNodes.length > 0) {
            const topY = researchNodes[0].y0;
            const bottomY = researchNodes[researchNodes.length - 1].y1;
            
            // Position bracket to the LEFT of the labels
            const labelMaxX = Math.min(...researchNodes.map(n => n.x0)) - 9;
            const bracketX = labelMaxX - 200;
            const bracketWidth = 15;
            
            // Draw bracket path
            const bracketPath = `
                M ${bracketX + bracketWidth} ${topY}
                L ${bracketX} ${topY}
                L ${bracketX} ${bottomY}
                L ${bracketX + bracketWidth} ${bottomY}
            `;
            
            svg.append("path")
                .attr("class", "bracket")
                .attr("d", bracketPath);
            
            // Add "Public-Facing Research" label (two lines)
            svg.append("text")
                .attr("class", "bracket-label")
                .attr("x", bracketX - 10)
                .attr("y", (topY + bottomY) / 2 - 10)
                .attr("text-anchor", "end")
                .attr("dominant-baseline", "middle")
                .text("Public-Facing");
            
            svg.append("text")
                .attr("class", "bracket-label")
                .attr("x", bracketX - 10)
                .attr("y", (topY + bottomY) / 2 + 10)
                .attr("text-anchor", "end")
                .attr("dominant-baseline", "middle")
                .text("Research");
        }
        
        // Draw links
        svg.append("g")
            .selectAll(".link")
            .data(links)
            .join("path")
            .attr("class", "link")
            .attr("d", d3.sankeyLinkHorizontal())
            .attr("stroke", d => d.source.color || "#999")
            .attr("stroke-width", d => Math.max(1, d.width))
            .on("mouseover", function(event, d) {
                const value = d.value;
                const formattedValue = value >= 1e9 ? `$${(value/1e9).toFixed(1)}B` :
                                      value >= 1e6 ? `$${(value/1e6).toFixed(1)}M` :
                                      `$${(value/1e3).toFixed(1)}K`;
                
                const sourceTotal = d.source.actualTotal || d.source.sourceLinks.reduce((sum, l) => sum + l.value, 0);
                const pct = ((d.value / sourceTotal) * 100).toFixed(1);
                
                tooltip.style("opacity", 1)
                    .html(`${d.source.name} → ${d.target.name}<br>${formattedValue} (${pct}% of ${d.source.name})`)
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY - 20) + "px");
            })
            .on("mouseout", () => tooltip.style("opacity", 0));
        
       // Draw nodes
        const node = svg.append("g")
            .selectAll(".node")
            .data(nodes)
            .join("g")
            .attr("class", "node");
        
        node.append("rect")
            .attr("x", d => d.x0)
            .attr("y", d => d.y0)
            .attr("height", d => d.y1 - d.y0)
            .attr("width", d => d.x1 - d.x0)
            .attr("fill", d => d.color)
            .on("mouseover", function(event, d) {
                // Show tooltip with total funding for this node
                if (d.actualTotal !== undefined) {
                    const formattedValue = d.actualTotal >= 1e9 ? `$${(d.actualTotal/1e9).toFixed(1)}B` :
                                          d.actualTotal >= 1e6 ? `$${(d.actualTotal/1e6).toFixed(1)}M` :
                                          `$${(d.actualTotal/1e3).toFixed(1)}K`;
                    
                    tooltip.style("opacity", 1)
                        .html(`${d.name}<br>${formattedValue} total funding`)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 20) + "px");
                }
            })
            .on("mouseout", () => tooltip.style("opacity", 0));
        
        // Add labels OUTSIDE the bars
        node.append("text")
            .attr("x", d => d.x0 < width / 2 ? d.x0 - 8 : d.x1 + 8)
            .attr("y", d => (d.y1 + d.y0) / 2)
            .attr("dy", "0.35em")
            .attr("text-anchor", d => d.x0 < width / 2 ? "end" : "start")
            .text(d => d.name)
            .style("cursor", "pointer")
            .on("mouseover", function(event, d) {
                // Show tooltip with total funding for this node
                if (d.actualTotal !== undefined) {
                    const formattedValue = d.actualTotal >= 1e9 ? `$${(d.actualTotal/1e9).toFixed(1)}B` :
                                          d.actualTotal >= 1e6 ? `$${(d.actualTotal/1e6).toFixed(1)}M` :
                                          `$${(d.actualTotal/1e3).toFixed(1)}K`;
                    
                    tooltip.style("opacity", 1)
                        .html(`${d.name}<br>${formattedValue} total funding`)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 20) + "px");
                }
            })
            .on("mouseout", () => tooltip.style("opacity", 0));
    </script>
</body>
</html>
